<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skia Renderer for Pixi.js + PDF Export</title>
</head>
<body>
  <div id="app">
    <header>
      <h1>🎨 Pixi.js ↔ Skia CanvasKit</h1>
      <div class="controls">
        <button id="btn-generate" disabled>🎲 Add Shape</button>
        <!-- 🆕 New Button -->
        <button id="btn-sprite" disabled>🖼️ Add Sprite</button>
        <button id="btn-export" disabled>📄 Export PDF</button>
        <span class="status" id="status">Initializing...</span>
      </div>
    </header>
    
    <div id="render-panels">
      <!-- ... panels remain unchanged ... -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Pixi.js (Canvas)</span>
          <span class="panel-fps" id="pixi-fps">-- FPS</span>
        </div>
        <div class="canvas-wrapper" id="pixi-container"></div>
      </div>
      
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Skia CanvasKit</span>
          <span class="panel-fps" id="skia-fps">-- FPS</span>
        </div>
        <div class="canvas-wrapper" id="skia-container">
          <canvas id="skia-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
